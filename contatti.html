                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-5">
        <section class="text-center mb-5">
            <h2 class="display-5 fw-bold">Parliamo di dati e AI</h2>
            <p class="text-muted">Compila il modulo, sarò felice di risponderti il prima possibile.</p>
        </section>

        <div class="row justify-content-center">
            <div class="col-lg-6 bg-white p-5 rounded-4 shadow-sm border">
                <form id="contact-form">
                    <div class="mb-3">
                        <input type="text" name="user_name" class="form-control" placeholder="Il tuo nome" required>
                    </div>
                    <div class="mb-3">
                        <input type="email" name="user_email" class="form-control" placeholder="La tua email" required>
                    </div>
                    <div class="mb-3">
                        <input type="text" name="subject" class="form-control" placeholder="Oggetto" required>
                    </div>
                    <div class="mb-3">
                        <textarea name="message" class="form-control" rows="5" placeholder="Il tuo messaggio" required></textarea>
                    </div>
                    <input type="hidden" name="time" id="time">
                    <button type="submit" class="btn btn-primary w-100">Invia Messaggio</button>
                </form>
                <div id="status" class="mt-3 text-center fw-bold"></div>
            </div>
        </div>
    </main>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){ emailjs.init("LNPJW5aDiXog1iiZd"); })();

        const form = document.getElementById('contact-form');
        const status = document.getElementById('status');

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            
            document.getElementById('time').value = new Date().toLocaleString('it-IT');
            
            status.innerText = "Invio in corso...";

            emailjs.sendForm('service_129e8pi', 'template_3piv6yj', this)
                .then(function() {
                    status.style.color = "green";
                    status.innerText = "Messaggio inviato con successo! Grazie.";
                    form.reset();
                }, function(error) {
                    status.style.color = "red";
                    status.innerText = "Errore nell'invio, riprova.";
                });
        });
    </script>
